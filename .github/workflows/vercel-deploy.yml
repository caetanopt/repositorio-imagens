name: Deploy to Vercel (Production)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Production Deploy
        run: |
          echo "Calling Vercel deploy hook..."
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "https://api.vercel.com/v1/integrations/deploy/prj_9K8sZjhPJAjOBi4RztzjG2ewckAI/YDA29rJJeK")
          echo "Response: $RESPONSE"
